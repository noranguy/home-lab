site_name: nico's homelab docs
site_url: https://noranguy.github.io/home-lab/
theme:
  name: material
  palette:
      - media: "(prefers-color-scheme)"
        toggle:
          icon: material/link
          name: Switch to light mode
      - media: "(prefers-color-scheme: light)"
        scheme: default
        primary: indigo
        accent: indigo
        toggle:
          icon: material/toggle-switch
          name: Switch to dark mode
      - media: "(prefers-color-scheme: dark)"
        scheme: slate
        primary: black
        accent: indigo
        toggle:
          icon: material/toggle-switch-off
          name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.tracking
  color_mode: dark
  favicon: img/favicon.ico
  font:
    text: Roboto
    code: Roboto Mono
nav:
  - Home: 
    - Home: home/home.md
    - Current Implementations: home/current-implementations.md
    - Planned Implementations: home/planned-implementations.md
  - About: blog/about.md
  - Server Setup: 
    - Server: server-setup/server-setup.md
    - Nextcloud: server-setup/nextcloud-setup.md
    - Cloudflare: server-setup/cloudflare-setup.md