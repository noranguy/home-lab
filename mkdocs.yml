site_name: nico's homelab docs
theme:
  name: material
  palette:
      - media: "(prefers-color-scheme)"
        toggle:
          icon: material/link
          name: Switch to light mode
      - media: "(prefers-color-scheme: light)"
        scheme: default
        primary: indigo
        accent: indigo
        toggle:
          icon: material/toggle-switch
          name: Switch to dark mode
      - media: "(prefers-color-scheme: dark)"
        scheme: slate
        primary: black
        accent: indigo
        toggle:
          icon: material/toggle-switch-off
          name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.tracking
  color_mode: dark
  favicon: img/favicon.ico
  font:
    text: Roboto
    code: Roboto Mono
nav:
  - Home: index.md
  - About: about.md
  - Server Setup: 
    - Server: server-setup.md
    - Nextcloud: nextcloud-setup.md
    - Cloudflare: cloudflare-setup.md